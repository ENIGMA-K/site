<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>业余无线电 CSV → JSON 转换器 (内联解析)</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: #f5f7fa;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: #1e3c5f;
        }
        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            padding: 15px;
            border-radius: 20px;
            border: 2px dashed #a0b8cc;
            resize: vertical;
            margin: 20px 0;
            font-size: 14px;
        }
        .btn {
            background: #1e3c5f;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 15px;
        }
        .btn:hover {
            background: #15324d;
        }
        .info {
            background: #eef3f9;
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
        }
        .note {
            color: #2b4f6e;
        }
        #status {
            margin-top: 15px;
            color: #1f7840;
            font-weight: 500;
        }
        .error {
            color: #b53b2b;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📁 业余无线电题库 CSV → JSON 转换器 (纯内联)</h2>
    <div class="info">
        <p>1. 将您原有的CSV文件内容（用记事本打开，全选复制）粘贴到下方文本域中。</p>
        <p>2. 点击“生成JSON并下载”，即可获得包含“正确积分”和“答题次数”字段的新JSON文件。</p>
        <p>3. 本工具完全在浏览器内运行，不依赖任何外部库。</p>
        <p>⚠️ 支持带引号的字段和换行符，但要求第一行为列标题。</p>
    </div>
    <textarea id="csvInput" placeholder="请粘贴CSV内容..."></textarea>
    <div>
        <button class="btn" id="convertBtn">生成JSON并下载</button>
        <span id="status"></span>
    </div>
    <p class="note">列名要求：<br>
        题号,题干,正确答案,选项A,选项B,选项C,选项D,是否包含图片,A类,B类,C类,正确积分,答题次数<br>
        （正确积分和答题次数若不存在，将自动补0）</p>
</div>

<script>
(function() {
    const convertBtn = document.getElementById('convertBtn');
    const csvInput = document.getElementById('csvInput');
    const statusSpan = document.getElementById('status');

    // 简易CSV解析函数（支持引号包裹的字段）
    function parseCSV(csvText) {
        const lines = [];
        let currentLine = [];
        let currentField = '';
        let inQuotes = false;
        let i = 0;

        // 统一换行符为 \n
        const text = csvText.replace(/\r\n/g, '\n').replace(/\r/g, '\n') + '\n'; // 末尾加换行方便处理

        for (i = 0; i < text.length; i++) {
            const ch = text[i];
            const nextCh = text[i+1];

            if (ch === '"' && !inQuotes) {
                // 开始引号
                inQuotes = true;
            } else if (ch === '"' && inQuotes) {
                // 结束引号或双引号转义
                if (nextCh === '"') {
                    // 两个引号连续，表示一个转义引号
                    currentField += '"';
                    i++; // 跳过下一个引号
                } else {
                    // 引号结束
                    inQuotes = false;
                }
            } else if (ch === ',' && !inQuotes) {
                // 字段结束
                currentLine.push(currentField);
                currentField = '';
            } else if (ch === '\n' && !inQuotes) {
                // 行结束
                currentLine.push(currentField);
                lines.push(currentLine);
                currentLine = [];
                currentField = '';
            } else {
                // 普通字符
                currentField += ch;
            }
        }

        // 移除可能的空行（最后一行可能由于末尾换行产生空）
        return lines.filter(line => line.length > 0 && !(line.length === 1 && line[0] === ''));
    }

    function cleanField(field) {
        // 去除字段首尾空格，并处理可能的引号包裹
        field = field.trim();
        if (field.startsWith('"') && field.endsWith('"')) {
            field = field.slice(1, -1).replace(/""/g, '"');
        }
        return field;
    }

    convertBtn.addEventListener('click', function() {
        const csvText = csvInput.value.trim();
        if (!csvText) {
            statusSpan.innerText = '❌ 请输入CSV内容';
            statusSpan.className = 'error';
            return;
        }

        statusSpan.innerText = '⏳ 解析中...';
        statusSpan.className = '';

        try {
            const lines = parseCSV(csvText);
            if (lines.length < 2) {
                throw new Error('CSV至少需要标题行和一行数据');
            }

            const headers = lines[0].map(h => cleanField(h));
            // 预期列名，但不必严格检查，只按实际列名处理
            const requiredFields = ['题号']; // 只要求题号存在，其他可选

            const dataRows = lines.slice(1).map(row => {
                const obj = {};
                headers.forEach((header, idx) => {
                    let value = row[idx] !== undefined ? cleanField(row[idx]) : '';
                    obj[header] = value;
                });

                // 确保数值字段存在且为数字
                ['A类', 'B类', 'C类', '正确积分', '答题次数'].forEach(field => {
                    if (!(field in obj) || obj[field] === '') {
                        obj[field] = 0;
                    } else {
                        const num = Number(obj[field]);
                        obj[field] = isNaN(num) ? 0 : num;
                    }
                });

                // 如果原CSV没有这些字段，补0
                if (!('正确积分' in obj)) obj['正确积分'] = 0;
                if (!('答题次数' in obj)) obj['答题次数'] = 0;

                return obj;
            }).filter(obj => obj['题号'] && obj['题号'].trim() !== ''); // 过滤无题号的行

            if (dataRows.length === 0) {
                throw new Error('没有找到有效题号的行');
            }

            // 生成JSON
            const jsonStr = JSON.stringify(dataRows, null, 2);
            const blob = new Blob(['\uFEFF' + jsonStr], { type: 'application/json;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `业余无线电题库_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
            URL.revokeObjectURL(link.href);

            statusSpan.innerText = `✅ 转换成功！共 ${dataRows.length} 题，已下载。`;
            statusSpan.className = '';
        } catch (e) {
            statusSpan.innerText = '❌ 解析失败：' + e.message;
            statusSpan.className = 'error';
        }
    });
})();
</script>
</body>
</html>
