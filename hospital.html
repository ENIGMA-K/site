<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>住院患者管理系统 v1.4.1</title>
    <!-- 优化视口设置，确保在移动设备上能正确缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0d6efd">
    
    <!-- 引入Bootstrap CSS -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        /* 基础布局与交互 */
        .patient-row:hover { cursor: pointer; }
        .highlight { background-color: #d1e7dd !important; }
        .sortable:hover { cursor: pointer; text-decoration: underline; }
        .todo-tag { padding: 2px 5px; border-radius: 3px; font-size: 0.85em; cursor: pointer; }
        .modal-body label { font-weight: bold; }
        .todo-item:hover { background-color: #f8f9fa; cursor: pointer; }

        /* 移动端优化 */
        @media (max-width: 768px) {
            .operation-bar .col-12 {
                margin-bottom: 8px;
            }
            .table-responsive {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .modal-body .col-12 {
                margin-bottom: 8px;
            }
        }

        @media (max-width: 1080px) {
            body {
                font-size: 14px;
            }
            .container-fluid {
                padding: 0.5rem;
            }
            .modal-content {
                max-height: 90vh;
                overflow-y: auto;
            }
        }

        @media (orientation: landscape) {
            .container-fluid {
                max-width: 100vw;
                padding: 0.5rem;
            }
            .modal-dialog {
                max-width: 90%;
            }
        }
    </style>

    <!-- 移动端增强优化样式 -->
    <style>
        * {
            -webkit-tap-highlight-color: rgba(0, 122, 255, 0.1);
        }

        .btn-sm,
        .form-control,
        .form-select,
        .todo-tag,
        .sortable th,
        #todoTable tbody tr,
        .patient-row td .todo-tag {
            touch-action: manipulation;
        }

        @media (max-width: 768px) {
            .btn-sm {
                padding: 0.5rem 0.9rem;
                font-size: 1rem;
                min-height: 44px;
                min-width: 44px;
                border-radius: 8px;
            }

            .form-control,
            .form-select {
                min-height: 48px;
                font-size: 16px;
                padding: 0.6rem 0.75rem;
            }

            .todo-tag {
                padding: 8px 14px !important;
                margin: 3px !important;
                border-radius: 24px !important;
                font-size: 0.95em !important;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
                display: inline-block;
                line-height: 1.2;
                font-weight: 500;
                transition: opacity 0.1s;
            }
            .todo-tag:active {
                opacity: 0.7;
            }

            .sortable th {
                padding: 14px 6px;
            }

            .operation-bar .flex-fill {
                flex: 1 1 160px;
                min-width: 140px;
            }

            .modal-body {
                padding: 1.2rem 1rem;
            }
            .modal-body .row.g-2 > [class*="col-"] {
                margin-bottom: 12px;
            }

            #tagSettings .form-control-color {
                width: 48px;
                height: 48px;
                padding: 4px;
            }
            #tagSettings .btn-sm {
                min-height: 44px;
                min-width: 44px;
            }

            #todoTable td {
                padding: 14px 10px;
            }
            #todoTable tbody tr {
                min-height: 58px;
            }

            #dischargedTable td {
                padding: 12px 6px;
            }

            .modal-content {
                border-radius: 20px 20px 0 0;
            }

            @media (orientation: landscape) {
                .modal-dialog {
                    max-width: 85%;
                    margin: 1.75rem auto;
                }
                .btn-sm {
                    min-height: 40px;
                }
            }
        }

        .patient-row:active,
        .btn:active,
        .sortable th:active,
        .todo-item:active {
            opacity: 0.75;
            background-color: rgba(0,0,0,0.03);
        }

        .todo-tag {
            transition: transform 0.1s, box-shadow 0.1s;
            border: none;
        }
        .todo-tag:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .modal-content {
            overflow: hidden;
        }

        #dischargedList .todo-tag {
            padding: 8px 14px !important;
            margin: 3px !important;
            border-radius: 24px !important;
        }

        select.form-select option {
            padding: 12px;
            font-size: 16px;
        }

        #importBtn, #exportBtn, #csvImportBtn {
            min-width: 60px;
        }
    </style>

    <!-- 常用标签按钮区域样式 -->
    <style>
        #commonTagsContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        #commonTagsContainer .tag-btn {
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.1s;
            background-color: #6c757d;
            flex: 0 0 auto;
            min-width: 70px;
            text-align: center;
        }
        #commonTagsContainer .tag-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        @media (max-width: 768px) {
            #commonTagsContainer .tag-btn {
                padding: 10px 20px;
                font-size: 1rem;
                min-height: 44px;
            }
        }
    </style>

    <!-- 换行控制 + 整行颜色样式 -->
    <style>
        /* 表头强制不换行 */
        #patientTable th,
        #dischargedTable th {
            white-space: nowrap;
        }

        /* 默认所有单元格强制不换行（配合横向滚动） */
        #patientTable td,
        #dischargedTable td {
            white-space: nowrap;
        }

        /* 备注列（第14列）允许换行 */
        #patientTable td:nth-child(14),
        #dischargedTable td:nth-child(14) {
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 200px;
            min-width: 120px;
        }

        /* 待办标签列（第15列）允许换行，但标签内部不换行，且强制白底+黑色默认文字 */
        #patientTable td:nth-child(15),
        #dischargedTable td:nth-child(15) {
            white-space: normal;
            word-break: normal;
            background-color: #ffffff !important;
            color: #000000 !important;  /* 待办列文字黑色，不受行颜色影响 */
        }

        /* 待办标签内部强制不换行，颜色由内联样式控制 */
        .todo-tag {
            white-space: nowrap !important;
            display: inline-block;
            max-width: none;
        }

        /* 出院表格同样适用 */
        #dischargedTable td:nth-child(14) {
            white-space: pre-wrap;
        }
        #dischargedTable td:nth-child(15) {
            white-space: normal;
            background-color: #ffffff !important;
            color: #000000 !important;
        }

        /* 备注单元格点击样式提示 */
        .remark-cell {
            cursor: pointer;
            background-color: inherit; /* 继承行背景，但通过内联样式覆盖 */
        }
        .remark-cell:hover {
            background-color: #f8f3d6 !important;  /* 悬停时改变，但优先级低于行内联？使用important确保 */
        }

        /* 行内备注单元格悬停效果覆盖行背景 */
        tr:hover .remark-cell {
            background-color: #f8f3d6 !important;
        }
    </style>
</head>

<body class="bg-light">

<div class="container-fluid py-2">
    <h5 class="text-center mb-2">住院患者管理系统 v1.4.1</h5>
    
    <!-- 操作栏 -->
    <div class="row mb-2 g-2 operation-bar">
        <div class="col-12 d-flex flex-wrap gap-2">
            <input type="text" id="filterName" class="form-control flex-fill" placeholder="搜索姓名">
            <input type="text" id="filterBed" class="form-control flex-fill" placeholder="搜索床号">
            <select id="filterStatus" class="form-select flex-fill">
                <option value="">全部状态</option>
                <option value="术前">术前</option>
                <option value="术后">术后</option>
                <option value="CICU">CICU</option>
                <option value="CCU">CCU</option>
                <option value="NICU">NICU</option>
                <option value="出院">出院</option>
            </select>
            <input type="number" id="filterDays" class="form-control flex-fill" placeholder="住院天数">
        </div>
        <div class="col-12 d-flex flex-wrap gap-2 justify-content-end">
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#todoModal">待办事项</button>
            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addPatientModal">新入患者</button>
            <button class="btn btn-info btn-sm" data-bs-toggle="modal" data-bs-target="#updateStatusModal">更新状态</button>
            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#addTodoModal">添加待办</button>
            <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#dischargeModal">患者出院</button>
            <button class="btn btn-outline-secondary btn-sm" id="importBtn">导入JSON</button>
            <button class="btn btn-outline-success btn-sm" id="exportBtn">导出JSON</button>
            <button class="btn btn-outline-primary btn-sm" id="csvImportBtn">导入CSV</button>
            <input type="file" id="fileInput" accept=".json" style="display:none;">
            <input type="file" id="csvFileInput" accept=".csv" style="display:none;">
        </div>
    </div>

    <!-- 在院患者列表 -->
    <h6 class="mt-2">在院患者</h6>
    <div class="table-responsive">
        <table class="table table-hover table-sm align-middle" id="patientTable">
            <thead class="table-dark">
                <tr>
                    <th class="sortable" data-key="name">姓名</th>
                    <th class="sortable" data-key="gender">性别</th>
                    <th class="sortable" data-key="age">年龄</th>
                    <th class="sortable" data-key="caseNumber">病案号</th>
                    <th class="sortable" data-key="bed">床号</th>
                    <th class="sortable" data-key="diagnosis">主要诊断</th>
                    <th class="sortable" data-key="doctor">主管医师</th>
                    <th class="sortable" data-key="status">状态</th>
                    <th class="sortable" data-key="admissionDate">住院日期</th>
                    <th class="sortable" data-key="admissionDays">住院天数</th>
                    <th class="sortable" data-key="surgeryDate">手术日期</th>
                    <th class="sortable" data-key="surgeryName">手术名称</th>
                    <th class="sortable" data-key="postopDays">术后天数</th>
                    <th>备注</th>
                    <th>待办标签</th>
                </tr>
            </thead>
            <tbody id="patientList"></tbody>
        </table>
    </div>

    <!-- 出院患者列表 -->
    <h6 class="mt-2">出院患者</h6>
    <div class="table-responsive">
        <table class="table table-hover table-sm align-middle" id="dischargedTable">
            <thead class="table-dark">
                <tr>
                    <th>姓名</th>
                    <th>性别</th>
                    <th>年龄</th>
                    <th>病案号</th>
                    <th>床号</th>
                    <th>主要诊断</th>
                    <th>主管医师</th>
                    <th>状态</th>
                    <th>住院日期</th>
                    <th>住院天数</th>
                    <th>手术日期</th>
                    <th>手术名称</th>
                    <th>术后天数</th>
                    <th>备注</th>
                    <th>待办标签</th>
                </tr>
            </thead>
            <tbody id="dischargedList"></tbody>
        </table>
    </div>
</div>

<!-- 新入患者弹窗 -->
<div class="modal fade" id="addPatientModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen-sm-down">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新入患者</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addPatientForm">
                    <div class="row g-2">
                        <div class="col-12 col-md-4"><label>患者姓名</label><input type="text" class="form-control" name="name" required></div>
                        <div class="col-12 col-md-2"><label>性别</label><input type="text" class="form-control" name="gender"></div>
                        <div class="col-12 col-md-2"><label>年龄</label><input type="number" class="form-control" name="age"></div>
                        <div class="col-12 col-md-4"><label>病案号</label><input type="text" class="form-control" name="caseNumber" required></div>
                        <div class="col-12 col-md-3"><label>床号</label><select class="form-select" name="bed" id="addBedSelect"></select></div>
                        <div class="col-12 col-md-3"><label>住院日期</label><input type="date" class="form-control" name="admissionDate"></div>
                        <div class="col-12 col-md-3"><label>手术日期</label><input type="date" class="form-control" name="surgeryDate"></div>
                        <div class="col-12 col-md-3"><label>手术名称</label><input type="text" class="form-control" name="surgeryName"></div>
                        <div class="col-12"><label>主要诊断</label><input type="text" class="form-control" name="diagnosis"></div>
                        <div class="col-12"><label>主管医师</label><input type="text" class="form-control" name="doctor"></div>
                        <div class="col-12"><label>备注</label><input type="text" class="form-control" name="remark"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="savePatientBtn">保存</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            </div>
        </div>
    </div>
</div>

<!-- 更新状态弹窗 -->
<div class="modal fade" id="updateStatusModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen-sm-down">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">更新患者状态</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-2">
                    <label>选择患者</label>
                    <select class="form-select" id="updateSelect">
                        <option value="">请选择患者</option>
                    </select>
                </div>
                <form id="updatePatientForm">
                    <div class="row g-2">
                        <div class="col-12 col-md-4"><label>患者姓名</label><input type="text" class="form-control" name="name" required></div>
                        <div class="col-12 col-md-2"><label>性别</label><input type="text" class="form-control" name="gender"></div>
                        <div class="col-12 col-md-2"><label>年龄</label><input type="number" class="form-control" name="age"></div>
                        <div class="col-12 col-md-4"><label>病案号</label><input type="text" class="form-control" name="caseNumber" required></div>
                        <div class="col-12 col-md-3"><label>床号</label><select class="form-select" name="bed" id="updateBedSelect"></select></div>
                        <div class="col-12 col-md-3"><label>住院日期</label><input type="date" class="form-control" name="admissionDate"></div>
                        <div class="col-12 col-md-3"><label>手术日期</label><input type="date" class="form-control" name="surgeryDate"></div>
                        <div class="col-12 col-md-3"><label>手术名称</label><input type="text" class="form-control" name="surgeryName"></div>
                        <div class="col-12"><label>主要诊断</label><input type="text" class="form-control" name="diagnosis"></div>
                        <div class="col-12"><label>主管医师</label><input type="text" class="form-control" name="doctor"></div>
                        <div class="col-12"><label>备注</label><input type="text" class="form-control" name="remark"></div>
                        <div class="col-12"><label>患者状态</label>
                            <select class="form-select" name="status">
                                <option value="术前">术前</option>
                                <option value="术后">术后</option>
                                <option value="CICU">CICU</option>
                                <option value="CCU">CCU</option>
                                <option value="NICU">NICU</option>
                                <option value="出院">出院</option>
                            </select>
                        </div>
                    </div>
                </form>
                <div id="statusAlert" class="alert alert-warning mt-2 d-none">状态已修改为“出院”，系统将自动转移至出院患者列表。</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveUpdateBtn">保存修改</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            </div>
        </div>
    </div>
</div>

<!-- 添加待办弹窗 -->
<div class="modal fade" id="addTodoModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">添加待办</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-2">
                    <label>选择患者（可多选）</label>
                    <div id="todoPatientList" style="max-height:200px; overflow-y:auto;"></div>
                </div>
                <div class="mb-2">
                    <label>待办内容</label>
                    <input type="text" class="form-control" id="newTodoContent" placeholder="请输入待办标签名称">
                </div>
                <!-- 常用标签区域 -->
                <div class="mb-2">
                    <label>常用标签</label>
                    <div id="commonTagsContainer"></div>
                </div>
                <div class="mb-2">
                    <label>待办颜色</label>
                    <input type="color" class="form-control form-control-color" id="newTodoColor" value="#ff0000">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="addTodoConfirmBtn">添加</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            </div>
        </div>
    </div>
</div>

<!-- 待办事项弹窗 -->
<div class="modal fade" id="todoModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">待办事项</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <table class="table table-sm" id="todoTable">
                    <thead>
                        <tr>
                            <th>标签名称</th>
                            <th>患者 (床号)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#manageTagsModal">设置待办标签</button>
            </div>
        </div>
    </div>
</div>

<!-- 管理标签弹窗 -->
<div class="modal fade" id="manageTagsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">管理待办标签</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-2" id="tagSettings"></div>
                <hr>
                <h6>添加新标签</h6>
                <div class="row g-2 align-items-center">
                    <div class="col-auto"><input type="text" class="form-control" id="newTagName" placeholder="标签名称"></div>
                    <div class="col-auto"><input type="color" class="form-control form-control-color" id="newTagColor" value="#ff0000"></div>
                    <div class="col-auto"><button class="btn btn-primary" id="addTagBtn">添加</button></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 患者出院弹窗 -->
<div class="modal fade" id="dischargeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">患者出院</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <select class="form-select" id="dischargeSelect">
                    <option value="">请选择患者</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="confirmDischargeBtn">确认出院</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            </div>
        </div>
    </div>
</div>

<!-- 备注编辑弹窗 -->
<div class="modal fade" id="editRemarkModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑备注</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea id="remarkEditTextarea" class="form-control" rows="4" placeholder="可输入多行备注..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="saveRemarkBtn">保存</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            </div>
        </div>
    </div>
</div>

<!-- 引入Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
class HospitalApp {
    constructor() {
        this.patients = []; // 在院患者
        this.discharged = []; // 出院患者
        this.tags = {
            "新入": "#FFA500",
            "出院病历": "#007BFF"
        };
        this.sortConfig = { key: null, asc: true };
        this.currentEditRemarkPatientId = null; // 用于备注编辑

        // 定义CSV列名映射（支持中英文）
        this.csvFieldMap = {
            '姓名': 'name', 'name': 'name',
            '性别': 'gender', 'gender': 'gender',
            '年龄': 'age', 'age': 'age',
            '病案号': 'caseNumber', 'caseNumber': 'caseNumber',
            '床号': 'bed', 'bed': 'bed',
            '主要诊断': 'diagnosis', 'diagnosis': 'diagnosis',
            '主管医师': 'doctor', 'doctor': 'doctor',
            '住院日期': 'admissionDate', 'admissionDate': 'admissionDate',
            '手术日期': 'surgeryDate', 'surgeryDate': 'surgeryDate',
            '手术名称': 'surgeryName', 'surgeryName': 'surgeryName',
            '备注': 'remark', 'remark': 'remark',
            '状态': 'status', 'status': 'status'
        };

        this.loadData();
        this.initEvents();
        this.renderAll();
        this.updateDischargeOptions();
        this.populateBedSelect('addBedSelect');
        this.populateBedSelect('updateBedSelect');
    }

    // ------------------- 数据处理 -------------------
    loadData() {
        const saved = localStorage.getItem('hospitalData');
        if (saved) {
            const data = JSON.parse(saved);
            this.patients = data.patients || [];
            this.discharged = data.discharged || [];
            this.tags = data.tags || this.tags;
        }
        this.cleanDischarged();
    }

    saveData() {
        this.cleanDischarged();
        localStorage.setItem('hospitalData', JSON.stringify({
            patients: this.patients,
            discharged: this.discharged,
            tags: this.tags
        }));
    }

    cleanDischarged() {
        this.discharged = this.discharged.filter(p => p.todos && p.todos.length > 0);
    }

    addPatient(data) {
        if (this.findPatientByCase(data.caseNumber)) {
            alert('病案号已存在，请检查！');
            return false;
        }
        const newPatient = {
            id: Date.now(),
            name: data.name,
            gender: data.gender,
            age: data.age,
            caseNumber: data.caseNumber,
            bed: data.bed,
            diagnosis: data.diagnosis,
            doctor: data.doctor,
            admissionDate: data.admissionDate,
            surgeryDate: data.surgeryDate,
            surgeryName: data.surgeryName,
            status: "术前",
            remark: data.remark || '',
            todos: ["新入"]
        };
        this.patients.push(newPatient);
        this.saveData();
        this.renderAll();
        this.updateDischargeOptions();
        return true;
    }

    // ------------------- 床号处理 -------------------
    populateBedSelect(selectId) {
        const select = document.getElementById(selectId);
        select.innerHTML = '';
        for (let i = 1; i <= 60; i++) {
            const num = i.toString().padStart(2, '0');
            const option = document.createElement('option');
            option.value = `${num}床`;
            option.textContent = `${num}床`;
            select.appendChild(option);
        }
        for (let i = 1; i <= 10; i++) {
            const option = document.createElement('option');
            option.value = `Z${i}床`;
            option.textContent = `Z${i}床`;
            select.appendChild(option);
        }
        for (let i = 1; i <= 20; i++) {
            const num = i.toString().padStart(2, '0');
            const option = document.createElement('option');
            option.value = `+${num}床`;
            option.textContent = `+${num}床`;
            select.appendChild(option);
        }
    }

    // 根据状态获取行背景色
    getStatusBackgroundColor(status) {
        switch (status) {
            case '术前': return '#e6f0ff'; // 浅蓝
            case '术后': return '#e0f0e0'; // 浅绿
            case 'CICU':
            case 'CCU':
            case 'NICU': return '#ffe6e6'; // 浅红
            case '出院': return '#ffffff'; // 白
            default: return '#ffffff';
        }
    }

    // 根据状态获取行文字颜色
    getStatusTextColor(status) {
        switch (status) {
            case '术前': return '#003366'; // 藏蓝
            case '术后': return '#006400'; // 墨绿
            case 'CICU':
            case 'CCU':
            case 'NICU': return '#8B0000'; // 暗红
            case '出院': return '#000000'; // 黑
            default: return '#000000';
        }
    }

    // 计算亮度并返回适合的文字颜色（黑色或白色）
    getContrastColor(hexColor) {
        let r, g, b;
        if (hexColor.startsWith('#')) {
            const hex = hexColor.substring(1);
            if (hex.length === 3) {
                r = parseInt(hex[0] + hex[0], 16);
                g = parseInt(hex[1] + hex[1], 16);
                b = parseInt(hex[2] + hex[2], 16);
            } else if (hex.length === 6) {
                r = parseInt(hex.substring(0, 2), 16);
                g = parseInt(hex.substring(2, 4), 16);
                b = parseInt(hex.substring(4, 6), 16);
            } else {
                return '#000000';
            }
        } else {
            return '#000000';
        }
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        return brightness > 128 ? '#000000' : '#ffffff';
    }

    // ------------------- 渲染 -------------------
    renderAll() {
        this.cleanDischarged();
        this.renderPatients();
        this.renderDischarged();
        this.renderTodoList();
        this.renderTagSettings();
        this.renderUpdateSelect();
        this.renderTodoPatientList();
        if (document.getElementById('addTodoModal').classList.contains('show')) {
            this.renderCommonTags();
        }
    }

    renderPatients() {
        const tbody = document.getElementById('patientList');
        tbody.innerHTML = '';
        const filtered = this.applyFilters(this.patients);
        const sorted = this.sortPatients(filtered);
        sorted.forEach(p => {
            const tr = document.createElement('tr');
            tr.className = 'patient-row';
            // 设置行背景色和文字颜色
            const bgColor = this.getStatusBackgroundColor(p.status);
            const textColor = this.getStatusTextColor(p.status);
            tr.style.backgroundColor = bgColor;
            tr.style.color = textColor;

            // 构建各列
            let html = '';
            // 姓名、性别、年龄、病案号、床号、主要诊断、主管医师、状态（直接显示文字）
            html += `<td>${p.name}</td>`;
            html += `<td>${p.gender || ''}</td>`;
            html += `<td>${p.age || ''}</td>`;
            html += `<td>${p.caseNumber}</td>`;
            html += `<td>${p.bed || ''}</td>`;
            html += `<td>${p.diagnosis || ''}</td>`;
            html += `<td>${p.doctor || ''}</td>`;
            html += `<td>${p.status}</td>`;  // 状态单元格无额外span，继承行颜色
            
            // 住院日期、住院天数、手术日期、手术名称、术后天数
            html += `<td>${p.admissionDate || ''}</td>`;
            html += `<td>${this.calculateDays(p.admissionDate)}</td>`;
            html += `<td>${p.surgeryDate || ''}</td>`;
            html += `<td>${p.surgeryName || ''}</td>`;
            html += `<td>${this.calculateDays(p.surgeryDate)}</td>`;
            
            // 备注列（添加类用于点击）
            html += `<td class="remark-cell" data-patient-id="${p.id}">${this.escapeHtml(p.remark || '')}</td>`;
            
            // 待办标签列（强制白底黑字，但标签颜色由内联控制）
            const todosHtml = p.todos.map(t => {
                const bgColor = this.tags[t] || '#6c757d';
                const textColor = this.getContrastColor(bgColor);
                return `<span class="todo-tag" style="background-color:${bgColor}; color:${textColor};" data-tag="${t}" data-patient="${p.id}">${t}</span>`;
            }).join(' ');
            html += `<td class="todo-cell" data-patient-id="${p.id}">${todosHtml}</td>`;
            
            tr.innerHTML = html;

            // 行单击高亮
            tr.addEventListener('click', (e) => {
                this.highlightRow(tr);
            });

            // 行双击打开更新状态（排除待办单元格）
            tr.addEventListener('dblclick', (e) => {
                if (e.target.closest('.todo-cell')) {
                    return;
                }
                this.openUpdateStatusForPatient(p.id);
            });

            // 待办标签单击事件
            tr.querySelectorAll('.todo-tag').forEach(tagEl => {
                tagEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.handleTodoClick(p.id, tagEl.dataset.tag);
                });
            });

            // 待办标签列双击事件（打开添加待办，并勾选当前患者）
            const todoCell = tr.querySelector('.todo-cell');
            todoCell.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (e.target.classList.contains('todo-tag')) {
                    return;
                }
                this.openAddTodoForPatient(p.id);
            });

            // 备注单元格单击编辑
            const remarkTd = tr.querySelector('.remark-cell');
            remarkTd.addEventListener('click', (e) => {
                e.stopPropagation();
                this.openRemarkEdit(p.id, p.remark);
            });

            tbody.appendChild(tr);
        });
    }

    renderDischarged() {
        const tbody = document.getElementById('dischargedList');
        tbody.innerHTML = '';
        this.discharged.forEach(p => {
            const tr = document.createElement('tr');
            const bgColor = this.getStatusBackgroundColor(p.status);
            const textColor = this.getStatusTextColor(p.status);
            tr.style.backgroundColor = bgColor;
            tr.style.color = textColor;

            let html = '';
            html += `<td>${p.name}</td>`;
            html += `<td>${p.gender || ''}</td>`;
            html += `<td>${p.age || ''}</td>`;
            html += `<td>${p.caseNumber}</td>`;
            html += `<td>${p.bed || ''}</td>`;
            html += `<td>${p.diagnosis || ''}</td>`;
            html += `<td>${p.doctor || ''}</td>`;
            html += `<td>${p.status}</td>`;
            html += `<td>${p.admissionDate || ''}</td>`;
            html += `<td>${this.calculateDays(p.admissionDate)}</td>`;
            html += `<td>${p.surgeryDate || ''}</td>`;
            html += `<td>${p.surgeryName || ''}</td>`;
            html += `<td>${this.calculateDays(p.surgeryDate)}</td>`;
            html += `<td class="remark-cell" data-patient-id="${p.id}">${this.escapeHtml(p.remark || '')}</td>`;

            const todosHtml = p.todos.map(t => {
                const bgColor = this.tags[t] || '#6c757d';
                const textColor = this.getContrastColor(bgColor);
                return `<span class="todo-tag" style="background-color:${bgColor}; color:${textColor};" data-tag="${t}" data-patient="${p.id}">${t}</span>`;
            }).join(' ');
            html += `<td class="todo-cell" data-patient-id="${p.id}">${todosHtml}</td>`;

            tr.innerHTML = html;

            // 双击行更新状态（但出院患者不可更新，所以只对在院有效，此处调用方法会提示）
            tr.addEventListener('dblclick', (e) => {
                if (e.target.closest('.todo-cell')) return;
                this.openUpdateStatusForPatient(p.id); // 会提示已出院
            });

            tr.querySelectorAll('.todo-tag').forEach(tagEl => {
                tagEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.handleTodoClick(p.id, tagEl.dataset.tag);
                });
            });

            const todoCell = tr.querySelector('.todo-cell');
            todoCell.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (e.target.classList.contains('todo-tag')) return;
                this.openAddTodoForPatient(p.id);
            });

            const remarkTd = tr.querySelector('.remark-cell');
            remarkTd.addEventListener('click', (e) => {
                e.stopPropagation();
                this.openRemarkEdit(p.id, p.remark);
            });

            tbody.appendChild(tr);
        });
    }

    // 打开更新状态弹窗并预选患者
    openUpdateStatusForPatient(patientId) {
        const patient = this.patients.find(p => p.id == patientId);
        if (!patient) {
            alert('该患者已出院，无法更新状态');
            return;
        }
        const select = document.getElementById('updateSelect');
        select.value = patientId;
        select.dispatchEvent(new Event('change'));
        const modal = new bootstrap.Modal(document.getElementById('updateStatusModal'));
        modal.show();
    }

    // 打开添加待办弹窗，并勾选指定患者
    openAddTodoForPatient(patientId) {
        this.renderTodoPatientList(); // 重新渲染以确保最新
        const checkbox = document.getElementById(`todoPatient${patientId}`);
        if (checkbox) {
            checkbox.checked = true;
        }
        const modal = new bootstrap.Modal(document.getElementById('addTodoModal'));
        modal.show();
    }

    renderTodoList() {
        const tbody = document.querySelector('#todoTable tbody');
        tbody.innerHTML = '';
        const tagMap = {};

        this.patients.concat(this.discharged).forEach(p => {
            p.todos.forEach(tag => {
                if (!tagMap[tag]) tagMap[tag] = [];
                tagMap[tag].push(`${p.name}（${p.bed}）`);
            });
        });

        Object.entries(tagMap).forEach(([tag, patients]) => {
            const tr = document.createElement('tr');
            tr.className = 'todo-item';
            tr.innerHTML = `
                <td>${tag}</td>
                <td>${patients.join(', ')}</td>
            `;
            tr.addEventListener('click', () => this.completeTodoTag(tag));
            tbody.appendChild(tr);
        });
    }

    renderTagSettings() {
        const container = document.getElementById('tagSettings');
        container.innerHTML = '';
        Object.entries(this.tags).forEach(([tag, color]) => {
            const div = document.createElement('div');
            div.className = 'col-12 col-md-6 d-flex align-items-center gap-2';
            div.innerHTML = `
                <span style="background-color:${color}; color:${this.getContrastColor(color)}; padding:2px 6px; border-radius:3px;">${tag}</span>
                <input type="color" class="form-control form-control-color" value="${color}" data-tag="${tag}">
                <button class="btn btn-sm btn-danger" data-tag="${tag}">删除</button>
            `;
            container.appendChild(div);
        });
    }

    renderUpdateSelect() {
        const select = document.getElementById('updateSelect');
        select.innerHTML = '<option value="">请选择患者</option>';
        this.patients.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = `${p.name} (${p.bed})`;
            select.appendChild(opt);
        });
    }

    renderTodoPatientList() {
        const container = document.getElementById('todoPatientList');
        container.innerHTML = '';
        this.patients.forEach(p => {
            const div = document.createElement('div');
            div.className = 'form-check';
            div.innerHTML = `
                <input class="form-check-input" type="checkbox" value="${p.id}" id="todoPatient${p.id}">
                <label class="form-check-label" for="todoPatient${p.id}">
                    ${p.name} (${p.bed})
                </label>
            `;
            container.appendChild(div);
        });
    }

    renderCommonTags() {
        const container = document.getElementById('commonTagsContainer');
        if (!container) return;
        container.innerHTML = '';
        Object.keys(this.tags).forEach(tagName => {
            const color = this.tags[tagName] || '#6c757d';
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.style.backgroundColor = color;
            btn.style.color = this.getContrastColor(color);
            btn.textContent = tagName;
            btn.setAttribute('data-tag', tagName);
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('newTodoContent').value = tagName;
                document.getElementById('newTodoColor').value = color;
            });
            container.appendChild(btn);
        });
    }

    // ------------------- 事件绑定 -------------------
    initEvents() {
        document.getElementById('savePatientBtn').addEventListener('click', () => {
            const form = document.getElementById('addPatientForm');
            const data = Object.fromEntries(new FormData(form).entries());
            if (this.addPatient(data)) {
                form.reset();
                bootstrap.Modal.getInstance(document.getElementById('addPatientModal')).hide();
            }
        });

        document.querySelectorAll('#filterName, #filterBed, #filterStatus, #filterDays')
            .forEach(el => el.addEventListener('input', () => this.renderPatients()));

        document.querySelectorAll('.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.key;
                if (this.sortConfig.key === key) {
                    this.sortConfig.asc = !this.sortConfig.asc;
                } else {
                    this.sortConfig.key = key;
                    this.sortConfig.asc = true;
                }
                this.renderPatients();
            });
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            const dataStr = JSON.stringify({
                patients: this.patients,
                discharged: this.discharged,
                tags: this.tags
            });
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hospital_data_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('importBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    this.patients = data.patients || [];
                    this.discharged = data.discharged || [];
                    this.tags = data.tags || this.tags;
                    this.saveData();
                    this.renderAll();
                    this.updateDischargeOptions();
                } catch (err) {
                    alert('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
        });

        document.getElementById('csvImportBtn').addEventListener('click', () => {
            document.getElementById('csvFileInput').click();
        });
        document.getElementById('csvFileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                this.addPatientsFromCSV(e.target.result);
            };
            reader.readAsText(file);
        });

        document.getElementById('addTagBtn').addEventListener('click', () => {
            const name = document.getElementById('newTagName').value.trim();
            const color = document.getElementById('newTagColor').value;
            if (name) {
                this.tags[name] = color;
                this.saveData();
                this.renderTodoList();
                this.renderTagSettings();
                document.getElementById('newTagName').value = '';
            }
        });
        document.getElementById('tagSettings').addEventListener('change', (e) => {
            if (e.target.type === 'color') {
                const tag = e.target.dataset.tag;
                this.tags[tag] = e.target.value;
                this.saveData();
                this.renderTodoList();
                this.renderTagSettings();
            }
        });
        document.getElementById('tagSettings').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                const tag = e.target.dataset.tag;
                delete this.tags[tag];
                this.patients.forEach(p => p.todos = p.todos.filter(t => t !== tag));
                this.discharged.forEach(p => p.todos = p.todos.filter(t => t !== tag));
                this.saveData();
                this.renderTodoList();
                this.renderPatients();
                this.renderDischarged();
                this.renderTagSettings();
                this.updateDischargeOptions();
            }
        });

        document.getElementById('updateSelect').addEventListener('change', (e) => {
            const pid = e.target.value;
            if (!pid) return;
            const patient = this.patients.find(p => p.id == pid);
            if (!patient) return;
            const form = document.getElementById('updatePatientForm');
            Object.keys(patient).forEach(key => {
                const input = form.querySelector(`[name="${key}"]`);
                if (input) input.value = patient[key];
            });
            const alertBox = document.getElementById('statusAlert');
            alertBox.classList.toggle('d-none', patient.status !== '出院');
        });
        document.getElementById('saveUpdateBtn').addEventListener('click', () => {
            const pid = document.getElementById('updateSelect').value;
            if (!pid) return;
            const patient = this.patients.find(p => p.id == pid);
            const form = document.getElementById('updatePatientForm');
            const data = Object.fromEntries(new FormData(form).entries());

            const existing = this.findPatientByCase(data.caseNumber);
            if (existing && existing.id !== patient.id) {
                alert('病案号已存在，请检查！');
                return;
            }

            Object.assign(patient, data);
            this.saveData();

            if (patient.status === '出院') {
                patient.todos.push('出院病历');
                this.discharged.push(patient);
                this.patients = this.patients.filter(p => p.id !== patient.id);
                this.renderDischarged();
                this.updateDischargeOptions();
            }

            this.renderAll();
            bootstrap.Modal.getInstance(document.getElementById('updateStatusModal')).hide();
        });

        document.getElementById('addTodoConfirmBtn').addEventListener('click', () => {
            const checked = Array.from(document.querySelectorAll('#todoPatientList input:checked'));
            const tag = document.getElementById('newTodoContent').value.trim();
            const color = document.getElementById('newTodoColor').value;
            if (!tag) return;
            this.tags[tag] = color;
            checked.forEach(cb => {
                const pid = parseInt(cb.value);
                const patient = this.patients.find(p => p.id === pid);
                if (patient && !patient.todos.includes(tag)) {
                    patient.todos.push(tag);
                }
            });
            this.saveData();
            this.renderAll();
            bootstrap.Modal.getInstance(document.getElementById('addTodoModal')).hide();
        });

        document.getElementById('confirmDischargeBtn').addEventListener('click', () => {
            const pid = document.getElementById('dischargeSelect').value;
            if (!pid) return;
            const patient = this.patients.find(p => p.id == pid);
            if (patient) {
                patient.status = '出院';
                patient.todos.push('出院病历');
                this.discharged.push(patient);
                this.patients = this.patients.filter(p => p.id != pid);
                this.saveData();
                this.renderAll();
                this.updateDischargeOptions();
                bootstrap.Modal.getInstance(document.getElementById('dischargeModal')).hide();
            }
        });

        window.addEventListener('orientationchange', () => {
            this.renderAll();
        });

        document.getElementById('addTodoModal').addEventListener('show.bs.modal', () => {
            this.renderCommonTags();
        });

        document.getElementById('saveRemarkBtn').addEventListener('click', () => {
            const newRemark = document.getElementById('remarkEditTextarea').value;
            const patientId = this.currentEditRemarkPatientId;
            if (!patientId) return;

            let patient = this.patients.find(p => p.id == patientId);
            if (!patient) patient = this.discharged.find(p => p.id == patientId);
            if (patient) {
                patient.remark = newRemark;
                this.saveData();
                this.renderAll();
            }
            bootstrap.Modal.getInstance(document.getElementById('editRemarkModal')).hide();
            this.currentEditRemarkPatientId = null;
        });
    }

    highlightRow(row) {
        document.querySelectorAll('.patient-row').forEach(r => r.classList.remove('highlight'));
        row.classList.add('highlight');
    }

    calculateDays(dateStr) {
        if (!dateStr) return '';
        const start = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
        return diff >= 0 ? diff : '';
    }

    applyFilters(patients) {
        const name = document.getElementById('filterName').value.trim().toLowerCase();
        const bed = document.getElementById('filterBed').value.trim().toLowerCase();
        const status = document.getElementById('filterStatus').value;
        const days = document.getElementById('filterDays').value;

        return patients.filter(p => {
            let match = true;
            if (name) match = match && p.name.toLowerCase().includes(name);
            if (bed) match = match && (p.bed || '').toLowerCase().includes(bed);
            if (status) match = match && p.status === status;
            if (days) {
                const stayDays = this.calculateDays(p.admissionDate);
                match = match && stayDays == days;
            }
            return match;
        });
    }

    sortPatients(patients) {
        if (!this.sortConfig.key) return patients;
        const key = this.sortConfig.key;
        const asc = this.sortConfig.asc;
        return patients.slice().sort((a, b) => {
            let valA = a[key] || '';
            let valB = b[key] || '';
            if (['age', 'admissionDays', 'postopDays'].includes(key)) {
                valA = parseInt(valA) || 0;
                valB = parseInt(valB) || 0;
                return asc ? valA - valB : valB - valA;
            }
            if (['admissionDate', 'surgeryDate'].includes(key)) {
                valA = new Date(valA);
                valB = new Date(valB);
                return asc ? valA - valB : valB - valA;
            }
            valA = valA.toString().toLowerCase();
            valB = valB.toString().toLowerCase();
            if (valA < valB) return asc ? -1 : 1;
            if (valA > valB) return asc ? 1 : -1;
            return 0;
        });
    }

    handleTodoClick(patientId, tag) {
        if (confirm(`是否完成待办 "${tag}"？`)) {
            const patient = this.patients.find(p => p.id == patientId) ||
                            this.discharged.find(p => p.id == patientId);
            if (patient) {
                patient.todos = patient.todos.filter(t => t !== tag);
                this.saveData();
                this.renderAll();
            }
        }
    }

    completeTodoTag(tag) {
        if (confirm(`是否完成待办 "${tag}"？`)) {
            this.patients.concat(this.discharged).forEach(p => {
                if (p.todos.includes(tag)) {
                    p.todos = p.todos.filter(t => t !== tag);
                }
            });
            this.saveData();
            this.renderAll();
        }
    }

    updateDischargeOptions() {
        const select = document.getElementById('dischargeSelect');
        select.innerHTML = '<option value="">请选择患者</option>';
        this.patients.filter(p => p.status !== '出院').forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = `${p.name} (${p.bed})`;
            select.appendChild(opt);
        });
    }

    // 新的CSV导入方法，按标题映射
    addPatientsFromCSV(csvContent) {
        const lines = csvContent.trim().split('\n');
        if (lines.length < 2) {
            alert('CSV文件至少包含标题行和一行数据');
            return;
        }

        // 解析标题行
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        const fieldIndices = {};
        headers.forEach((header, index) => {
            const lowerHeader = header.toLowerCase();
            for (let key in this.csvFieldMap) {
                if (key.toLowerCase() === lowerHeader) {
                    fieldIndices[this.csvFieldMap[key]] = index;
                    break;
                }
            }
        });

        if (fieldIndices['name'] === undefined || fieldIndices['caseNumber'] === undefined) {
            alert('CSV必须包含姓名和病案号列（列名可以是“姓名”/“name”及“病案号”/“caseNumber”）');
            return;
        }

        let addedCount = 0;
        let errorCount = 0;
        const today = new Date().toISOString().split('T')[0];

        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
            
            const patient = {
                id: Date.now() + i,
                name: values[fieldIndices['name']] || '',
                gender: fieldIndices['gender'] !== undefined ? values[fieldIndices['gender']] || '' : '',
                age: fieldIndices['age'] !== undefined ? parseInt(values[fieldIndices['age']]) || '' : '',
                caseNumber: values[fieldIndices['caseNumber']] || '',
                bed: fieldIndices['bed'] !== undefined ? values[fieldIndices['bed']] || '' : '',
                diagnosis: fieldIndices['diagnosis'] !== undefined ? values[fieldIndices['diagnosis']] || '' : '',
                doctor: fieldIndices['doctor'] !== undefined ? values[fieldIndices['doctor']] || '' : '',
                admissionDate: fieldIndices['admissionDate'] !== undefined ? values[fieldIndices['admissionDate']] || '' : today,
                surgeryDate: fieldIndices['surgeryDate'] !== undefined ? values[fieldIndices['surgeryDate']] || '' : '',
                surgeryName: fieldIndices['surgeryName'] !== undefined ? values[fieldIndices['surgeryName']] || '' : '',
                remark: fieldIndices['remark'] !== undefined ? values[fieldIndices['remark']] || '' : '',
                status: fieldIndices['status'] !== undefined ? values[fieldIndices['status']] || '术前' : '术前',
                todos: ["新入"]
            };

            if (!patient.name || !patient.caseNumber) {
                console.warn(`第 ${i+1} 行缺少姓名或病案号，已跳过`);
                errorCount++;
                continue;
            }

            if (this.findPatientByCase(patient.caseNumber)) {
                console.warn(`第 ${i+1} 行病案号 ${patient.caseNumber} 已存在，已跳过`);
                errorCount++;
                continue;
            }

            this.patients.push(patient);
            addedCount++;
        }

        this.saveData();
        this.renderAll();
        this.updateDischargeOptions();
        alert(`CSV导入完成：成功添加 ${addedCount} 条记录，${errorCount} 条记录因错误被跳过。`);
    }

    findPatientByCase(caseNumber) {
        return this.patients.find(p => p.caseNumber === caseNumber) ||
               this.discharged.find(p => p.caseNumber === caseNumber);
    }

    openRemarkEdit(patientId, currentRemark) {
        this.currentEditRemarkPatientId = patientId;
        document.getElementById('remarkEditTextarea').value = currentRemark || '';
        const modal = new bootstrap.Modal(document.getElementById('editRemarkModal'));
        modal.show();
    }

    escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/[&<>"]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new HospitalApp();
});
</script>
