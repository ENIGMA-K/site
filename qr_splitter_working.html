<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>二维码分割器（最终版）</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        textarea { width: 100%; height: 200px; font-family: monospace; padding: 8px; }
        button { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .qrcode-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .qrcode-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; width: 260px; }
        .qrcode-card canvas { max-width: 100%; height: auto; }
    </style>
    <!-- 使用 qrcode-generator 官方库 (CDN，但可离线保存后本地引用) -->
    <!-- 注意：如果内网无法联网，请先将此库下载为本地文件，并修改 src 为本地路径 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <!-- 如果无法联网，请将上述库下载后放在同目录，并改为 <script src="qrcode.min.js"></script> -->
</head>
<body>
    <h1>🔲 长文本 → 多二维码分割器 (兼容版)</h1>
    <p>输入长文本，工具将按每段字符数分割，并为每段生成二维码。请截图保存所有二维码。</p>
    <textarea id="inputText" placeholder="粘贴需要编码的长文本..."></textarea>
    <div>
        每段字符数：<input type="number" id="chunkSize" value="500" min="100" max="2000"> (建议500-700，确保二维码清晰)
        <button onclick="splitAndGenerate()">分割并生成二维码</button>
        <button onclick="clearAll()">清空</button>
    </div>
    <div id="qrcodeContainer" class="qrcode-container"></div>
    <div style="margin-top:20px; background:#eee; padding:10px;">
        <p><strong>备用方案：如果二维码无法使用，可以点击下方按钮复制所有片段文本，手动传入内网。</strong></p>
        <button onclick="copyAllFragments()">📋 复制所有片段文本</button>
    </div>
    <script>
        function generateQRCode(text, size) {
            size = size || 250;
            // 使用 qrcode-generator 官方 API
            var qr = qrcode(0, 'H'); // 版本0自动，高纠错级别
            qr.addData(text);
            qr.make();
            var canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext('2d');
            var moduleCount = qr.getModuleCount();
            var cellSize = size / moduleCount;
            for (var row = 0; row < moduleCount; row++) {
                for (var col = 0; col < moduleCount; col++) {
                    ctx.fillStyle = qr.isDark(row, col) ? '#000000' : '#ffffff';
                    ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                }
            }
            return canvas;
        }

        function splitAndGenerate() {
            var text = document.getElementById('inputText').value;
            if (!text) { alert('请输入文本'); return; }
            var chunkSize = parseInt(document.getElementById('chunkSize').value) || 500;
            var total = Math.ceil(text.length / chunkSize);
            var container = document.getElementById('qrcodeContainer');
            container.innerHTML = '';
            for (var i = 0; i < total; i++) {
                var start = i * chunkSize;
                var end = Math.min(start + chunkSize, text.length);
                var chunk = text.substring(start, end);
                // 添加片段标识符： 【第i+1段/共total段】
                var marker = `【第${i+1}段/共${total}段】`;
                var data = marker + chunk;
                var canvas = generateQRCode(data, 250);
                var card = document.createElement('div');
                card.className = 'qrcode-card';
                card.innerHTML = `<h4>片段 ${i+1}/${total}</h4>`;
                card.appendChild(canvas);
                // 添加复制按钮（复制带标识的完整文本）
                var copyBtn = document.createElement('button');
                copyBtn.textContent = '复制本段';
                copyBtn.onclick = (function(text) { return function() { 
                    navigator.clipboard.writeText(text).then(() => alert('已复制')).catch(() => prompt('复制失败，请手动复制：', text));
                }; })(data);
                card.appendChild(copyBtn);
                container.appendChild(card);
            }
        }

        function copyAllFragments() {
            var text = document.getElementById('inputText').value;
            if (!text) { alert('请输入文本'); return; }
            var chunkSize = parseInt(document.getElementById('chunkSize').value) || 500;
            var total = Math.ceil(text.length / chunkSize);
            var all = '';
            for (var i = 0; i < total; i++) {
                var start = i * chunkSize;
                var end = Math.min(start + chunkSize, text.length);
                var chunk = text.substring(start, end);
                all += `【第${i+1}段/共${total}段】` + chunk + '\n';
            }
            navigator.clipboard.writeText(all).then(() => alert('已复制所有片段到剪贴板')).catch(() => {
                prompt('复制失败，请手动复制以下内容：', all);
            });
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('qrcodeContainer').innerHTML = '';
        }
    </script>
</body>
</html>
