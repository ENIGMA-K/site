                return r.EXP_TABLE[255 - r.LOG_TABLE[a]];
            };
            r.EXP_TABLE = new Array(256);
            r.LOG_TABLE = new Array(256);
            for (var s = 0; s < 8; s++) r.EXP_TABLE[s] = 1 << s;
            for (var s = 8; s < 256; s++) r.EXP_TABLE[s] = r.EXP_TABLE[s - 4] ^ r.EXP_TABLE[s - 5] ^ r.EXP_TABLE[s - 6] ^ r.EXP_TABLE[s - 8];
            for (var s = 0; s < 255; s++) r.LOG_TABLE[r.EXP_TABLE[s]] = s;
            return r;
        }();

        function generateQRCode(text, size) {
            size = size || 200;
            var qr = new qrcode();
            qr.typeNumber = 0; // 自动选择版本
            qr.errorCorrectLevel = 1; // L 纠错
            qr.addData(text);
            qr.make();
            var canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            var ctx = canvas.getContext('2d');
            var moduleCount = qr.getModuleCount();
            var cellSize = size / moduleCount;
            for (var row = 0; row < moduleCount; row++) {
                for (var col = 0; col < moduleCount; col++) {
                    var isDark = qr.isDark(row, col);
                    ctx.fillStyle = isDark ? '#000' : '#fff';
                    ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                }
            }
            return canvas;
        }
    </script>
</head>
<body>
    <h1>🔲 长文本 → 多二维码分割器 (稳定版)</h1>
    <p>输入长文本，工具将按每段字符数分割，并为每段生成二维码。请截图保存所有二维码。</p>
    <textarea id="inputText" placeholder="粘贴需要编码的长文本..."></textarea>
    <div>
        每段字符数：<input type="number" id="chunkSize" value="600" min="100" max="2000"> (建议600-800，汉字多时用较小值)
        <button onclick="splitAndGenerate()">分割并生成二维码</button>
        <button onclick="clearAll()">清空</button>
    </div>
    <div id="qrcodeContainer" class="qrcode-container"></div>
    <div class="footer">
        <p>使用方法：</p>
        <ol>
            <li>在外网电脑打开此页面，粘贴您的HTML脚本（例如提取工具代码）。</li>
            <li>点击生成，为每个片段截图保存二维码图片。</li>
            <li>将截图传入内网，使用下方的“二维码合并器”还原。</li>
        </ol>
    </div>
    <script>
        function splitAndGenerate() {
            var text = document.getElementById('inputText').value;
            if (!text) { alert('请输入文本'); return; }
            var chunkSize = parseInt(document.getElementById('chunkSize').value) || 600;
            var total = Math.ceil(text.length / chunkSize);
            var container = document.getElementById('qrcodeContainer');
            container.innerHTML = '';
            for (var i = 0; i < total; i++) {
                var start = i * chunkSize;
                var end = Math.min(start + chunkSize, text.length);
                var chunk = text.substring(start, end);
                // 添加片段标识符： 【第i+1段/共total段】
                var marker = `【第${i+1}段/共${total}段】`;
                var data = marker + chunk;
                var canvas = generateQRCode(data, 250);
                var card = document.createElement('div');
                card.className = 'qrcode-card';
                card.innerHTML = `<h4>片段 ${i+1}/${total}</h4>`;
                card.appendChild(canvas);
                // 添加复制按钮（复制纯文本片段，不含标识）
                var copyBtn = document.createElement('button');
                copyBtn.textContent = '复制文本';
                copyBtn.onclick = (function(text) { return function() { navigator.clipboard.writeText(text).then(() => alert('已复制')).catch(() => alert('复制失败，请手动复制')); }; })(data);
                card.appendChild(copyBtn);
                container.appendChild(card);
            }
        }
        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('qrcodeContainer').innerHTML = '';
        }
    </script>
</body>
</html>
